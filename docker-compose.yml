services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: videohub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: videohub
      POSTGRES_PASSWORD: videohub_password
      POSTGRES_DB: videohub
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U videohub']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: videohub_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS API ───────────────────────────────────────────────────────────────
  # DISABLED: Run the API on the host with `npm run start:dev` instead.
  # Both port 3000 (API) and 3001 (Next.js) are already in use on the host.
  # Docker is only needed here for postgres + redis.
  #
  # api:
  #   build:
  #     context: ./videohub
  #     dockerfile: Dockerfile
  #   container_name: videohub_api
  #   restart: unless-stopped
  #   ports:
  #     - '3002:3000'
  #   env_file:
  #     - ./videohub/.env
  #   environment:
  #     DATABASE_URL: postgresql://videohub:videohub_password@postgres:5432/videohub
  #     REDIS_URL: redis://redis:6379
  #     PORT: 3000
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - uploads_data:/app/uploads

volumes:
  postgres_data:
  redis_data:
  uploads_data:
